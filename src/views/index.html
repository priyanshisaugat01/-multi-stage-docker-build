<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flight Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      padding: 2rem;
      background: rgba(0,0,0,0.6);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.5rem;
      margin: 0;
      letter-spacing: 2px;
    }
    p {
      font-size: 1.2rem;
      margin-top: 1rem;
    }
    a {
      color: #00d9ff;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
    .card {
      background: rgba(255,255,255,0.1);
      margin: 2rem auto;
      padding: 2rem;
      border-radius: 12px;
      max-width: 600px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <header>
    <h1>✈️ Flight Status Dashboard</h1>
    <p>Track live flight data with a modern interface</p>
  </header>

  <div class="card">
    <p>Visit <a href="/flights">/flights</a> to see styled flight data.</p>
  </div>
</body>
</html>
